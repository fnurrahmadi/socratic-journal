<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <title>the dollars — private reflection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    :root { --ink:#050505; --paper:#f3f0e7; --yellow:#f4e500; --grey:#9c9c98; --line:#333; --danger:#ff645c; }
    * { box-sizing:border-box; } body { min-width:320px; min-height:100vh; margin:0; color:var(--paper); background:var(--ink); font-family:"Space Grotesk",sans-serif; } button,textarea { font:inherit; }
    .shell { width:min(100% - 32px,920px); min-height:100vh; margin:auto; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:27px 0 21px; border-bottom:1px solid var(--line); }
    .mark { display:flex; align-items:center; gap:12px; color:var(--yellow); font:600 13px/1 "IBM Plex Mono",monospace; letter-spacing:.19em; text-transform:uppercase; }
    .mark-symbol { width:21px; height:21px; display:grid; place-items:center; border:2px solid var(--yellow); border-radius:50%; font-size:16px; letter-spacing:0; }
    .status { color:var(--grey); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.12em; text-transform:uppercase; }.status::before { content:""; display:inline-block; width:7px; height:7px; margin-right:7px; border-radius:50%; background:var(--yellow); box-shadow:0 0 10px var(--yellow); }
    .intro { padding:clamp(36px,8vw,76px) 0 26px; }.eyebrow { margin:0 0 12px; color:var(--yellow); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.16em; text-transform:uppercase; } h1 { max-width:650px; margin:0; font-size:clamp(2.15rem,7vw,4.8rem); font-weight:600; letter-spacing:-.065em; line-height:.93; }h1 em { color:var(--yellow); font-style:normal; }.subhead { max-width:425px; margin:20px 0 0; color:var(--grey); font-size:15px; line-height:1.5; }
    .terminal { flex:1; min-height:390px; border:1px solid var(--line); background:#0a0a0a; }.terminal-bar { display:flex; justify-content:space-between; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); color:var(--grey); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.1em; text-transform:uppercase; }
    #chat { min-height:315px; max-height:48vh; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:23px; scroll-behavior:smooth; }.message { width:min(100%,680px); font-size:15px; line-height:1.55; white-space:pre-wrap; overflow-wrap:anywhere; }.message.user { align-self:flex-end; padding-left:32px; }.message-label { margin-bottom:7px; color:var(--yellow); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.13em; text-transform:uppercase; }.message.user .message-label { color:var(--grey); text-align:right; }.message-body { border-left:2px solid var(--yellow); padding-left:12px; }.message.user .message-body { border-left:0; border-right:2px solid var(--grey); padding:0 12px 0 0; text-align:right; }
    .typing { display:flex; align-items:center; gap:6px; min-height:24px; }.dot { width:5px; height:5px; background:var(--yellow); animation:blink 1s infinite alternate; }.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}@keyframes blink{to{opacity:.18}}
    .composer { display:flex; border-top:1px solid var(--line); }textarea { flex:1; min-width:0; min-height:82px; resize:vertical; border:0; outline:0; padding:19px 18px; background:transparent; color:var(--paper); font-size:15px; line-height:1.45; }textarea::placeholder{color:#6d6d69}#reflectButton { width:144px; border:0; border-left:1px solid var(--line); background:var(--yellow); color:#070707; cursor:pointer; font:600 11px/1 "IBM Plex Mono",monospace; letter-spacing:.1em; text-transform:uppercase; transition:background .15s,color .15s; }#reflectButton:hover:not(:disabled){background:var(--paper)}#reflectButton:disabled{cursor:wait;opacity:.6}.error { min-height:18px; margin:10px 0 0; color:var(--danger); font:500 11px/1.4 "IBM Plex Mono",monospace; }.footer { display:flex; justify-content:space-between; gap:16px; padding:17px 0 27px; color:#777772; font:400 10px/1.4 "IBM Plex Mono",monospace; letter-spacing:.04em; }
    @media(max-width:600px){.shell{width:min(100% - 24px,920px)}.status{font-size:8px}.intro{padding-top:45px}.terminal{min-height:450px}#chat{max-height:none;min-height:350px;padding:18px}.composer{display:block}textarea{width:100%;min-height:100px}#reflectButton{width:100%;height:55px;border:0;border-top:1px solid var(--line)}.footer{display:block}.footer span+span{display:block;margin-top:5px}}
  </style>
</head>
<body>
  <main class="shell">
    <header><div class="mark"><span class="mark-symbol">$</span> the dollars</div><div class="status">private channel</div></header>
    <section class="intro"><p class="eyebrow">/// Socratic journaling companion</p><h1>Say the quiet part <em>out loud.</em></h1><p class="subhead">No advice. No answers. Just a place to follow the thread of what you are thinking.</p></section>
    <section class="terminal" aria-label="Journal conversation"><div class="terminal-bar"><span>reflection log</span><span>session / local</span></div><div id="chat" role="log" aria-live="polite"></div><form id="composer" class="composer"><textarea id="messageInput" rows="3" maxlength="6000" placeholder="Type what is on your mind..." aria-label="Your journal entry"></textarea><button id="reflectButton" type="submit">Reflect ↗</button></form></section>
    <p class="error" id="error" role="alert" hidden></p><footer class="footer"><span>CTRL + ENTER / SEND</span><span>YOUR WORDS ARE SENT ONLY TO THE AI SERVICE TO GENERATE A RESPONSE.</span></footer>
  </main>
  <script>
    // Replace this URL after you deploy the Cloudflare Worker.
    const API_ENDPOINT = "https://YOUR-WORKER-NAME.YOUR-SUBDOMAIN.workers.dev/chat";
    const chat=document.getElementById("chat"),form=document.getElementById("composer"),messageInput=document.getElementById("messageInput"),reflectButton=document.getElementById("reflectButton"),errorElement=document.getElementById("error"),conversation=[];
    function addMessage(role,content){const message=document.createElement("article");message.className=`message ${role}`;const label=document.createElement("div");label.className="message-label";label.textContent=role==="assistant"?"Duck / signal received":"You / transmission";const body=document.createElement("div");body.className="message-body";body.textContent=content;message.append(label,body);chat.appendChild(message);chat.scrollTop=chat.scrollHeight}
    function addTypingIndicator(){const indicator=document.createElement("div");indicator.className="message assistant typing";indicator.setAttribute("aria-label","Duck is reflecting");indicator.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';chat.appendChild(indicator);chat.scrollTop=chat.scrollHeight;return indicator}function showError(message){errorElement.textContent=message;errorElement.hidden=false}function clearError(){errorElement.textContent="";errorElement.hidden=true}function setLoading(loading){reflectButton.disabled=loading;messageInput.disabled=loading;reflectButton.textContent=loading?"Listening...":"Reflect ↗"}
    form.addEventListener("submit",async event=>{event.preventDefault();const userMessage=messageInput.value.trim();if(!userMessage)return messageInput.focus();if(API_ENDPOINT.includes("YOUR-WORKER-NAME"))return showError("Set your deployed Worker URL in index.html before using the journal.");clearError();addMessage("user",userMessage);conversation.push({role:"user",content:userMessage});messageInput.value="";setLoading(true);const typing=addTypingIndicator();try{const response=await fetch(API_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:conversation})});const data=await response.json();if(!response.ok)throw new Error(data.error||"The reflection service could not respond.");if(!data.message)throw new Error("No reflection was returned. Please try again.");conversation.push({role:"assistant",content:data.message});addMessage("assistant",data.message)}catch(error){console.error(error);showError(error.message||"A connection error occurred. Please try again.")}finally{typing.remove();setLoading(false);messageInput.focus()}});
    messageInput.addEventListener("keydown",event=>{if(event.key==="Enter"&&(event.ctrlKey||event.metaKey)){event.preventDefault();form.requestSubmit()}});addMessage("assistant","What is on your mind today? Let's untangle it.");
  </script>
</body>
</html>
