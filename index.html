<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Socratic Journaling Companion</title>
  <style>
    :root {
      --page: #f7f6f3;
      --surface: #ffffff;
      --ink: #292826;
      --muted: #77736d;
      --line: #e8e5df;
      --user: #e9eee9;
      --assistant: #f4f2ee;
      --accent: #3d5544;
      --danger: #9a3f36;
      --shadow: 0 18px 50px rgba(48, 42, 34, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    .app {
      width: min(860px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 34px 0 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .key-panel {
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 15px;
    }

    .key-panel label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .key-row {
      display: flex;
      gap: 10px;
    }

    input, textarea, button {
      font: inherit;
    }

    #apiKey {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      font-size: 0.9rem;
    }

    #apiKey:focus, #messageInput:focus {
      border-color: #aab9ac;
      box-shadow: 0 0 0 3px rgba(61, 85, 68, 0.1);
    }

    .toggle-key {
      border: 0;
      border-radius: 9px;
      padding: 0 13px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .chat-card {
      flex: 1;
      min-height: 440px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: min(78%, 600px);
      padding: 13px 15px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.96rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border-bottom-left-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 4px;
    }

    .message-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 650;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 12px 15px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: #fdfcfb;
    }

    #messageInput {
      flex: 1;
      min-width: 0;
      min-height: 48px;
      max-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 12px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      line-height: 1.4;
    }

    #reflectButton {
      align-self: flex-end;
      min-height: 48px;
      border: 0;
      border-radius: 11px;
      padding: 0 18px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    #reflectButton:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #reflectButton:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .hint, .error {
      margin: 0;
      padding: 0 2px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 600px) {
      .app { width: min(100% - 20px, 860px); padding-top: 20px; }
      header { align-items: flex-start; flex-direction: column; gap: 4px; }
      .chat-card { min-height: 500px; }
      #chat { padding: 18px; }
      .message { max-width: 90%; }
      .composer { padding: 12px; gap: 8px; }
      #reflectButton { padding: 0 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Socratic Journaling Companion</h1>
      <p class="subtitle">A quiet place to think out loud.</p>
    </header>

    <section class="key-panel" aria-label="Groq API settings">
      <label for="apiKey">Groq API key</label>
      <div class="key-row">
        <input
          id="apiKey"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="gsk_..."
          aria-describedby="keyNote"
        />
        <button class="toggle-key" id="toggleKey" type="button" aria-label="Show API key">Show</button>
      </div>
    </section>

    <section class="chat-card" aria-label="Journal conversation">
      <div id="chat" role="log" aria-live="polite"></div>

      <form id="composer" class="composer">
        <textarea
          id="messageInput"
          placeholder="Write what is on your mind..."
          aria-label="Your journal entry"
          rows="2"
        ></textarea>
        <button id="reflectButton" type="submit">Reflect</button>
      </form>
    </section>

    <p class="hint" id="keyNote">Your key is saved only in this browser. Press Ctrl + Enter to reflect.</p>
    <p class="error" id="error" role="alert" hidden></p>
  </main>

  <script>
    const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";
    const MODEL = "llama-3.3-70b-versatile";
    const STORAGE_KEY = "socratic-journal-groq-api-key";

    const systemPrompt = `You are a Socratic Journaling Companion. Your sole purpose is to help the user clarify their thoughts, uncover hidden assumptions, and work through complex problems.
Strict Rules:
1. Never offer solutions, advice, or summaries. Do not tell them what to do.
2. Be incredibly brief (maximum 2-3 sentences).
3. End every response with exactly ONE clear, deep, open-ended question. Never ask multiple questions.
4. Actively listen for logical gaps, cognitive distortions, or unstated assumptions, and gently ask a question about that specific pivot point.
5. Tone: Grounded, empathetic, non-judgmental, and intellectually curious.`;

    const chat = document.getElementById("chat");
    const form = document.getElementById("composer");
    const apiKeyInput = document.getElementById("apiKey");
    const toggleKeyButton = document.getElementById("toggleKey");
    const messageInput = document.getElementById("messageInput");
    const reflectButton = document.getElementById("reflectButton");
    const errorElement = document.getElementById("error");

    const conversation = [
      { role: "system", content: systemPrompt }
    ];

    apiKeyInput.value = localStorage.getItem(STORAGE_KEY) || "";

    function addMessage(role, content) {
      const message = document.createElement("article");
      message.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = role === "assistant" ? "Duck" : "You";

      const text = document.createElement("div");
      text.textContent = content;

      message.append(label, text);
      chat.appendChild(message);
      chat.scrollTop = chat.scrollHeight;
      return message;
    }

    function showError(message) {
      errorElement.textContent = message;
      errorElement.hidden = false;
    }

    function clearError() {
      errorElement.textContent = "";
      errorElement.hidden = true;
    }

    function setLoading(isLoading) {
      reflectButton.disabled = isLoading;
      messageInput.disabled = isLoading;
      reflectButton.textContent = isLoading ? "Thinking..." : "Reflect";
    }

    function addTypingIndicator() {
      const indicator = document.createElement("div");
      indicator.className = "message assistant typing";
      indicator.setAttribute("aria-label", "Duck is thinking");
      indicator.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      chat.appendChild(indicator);
      chat.scrollTop = chat.scrollHeight;
      return indicator;
    }

    apiKeyInput.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim());
      clearError();
    });

    toggleKeyButton.addEventListener("click", () => {
      const showing = apiKeyInput.type === "text";
      apiKeyInput.type = showing ? "password" : "text";
      toggleKeyButton.textContent = showing ? "Show" : "Hide";
      toggleKeyButton.setAttribute("aria-label", showing ? "Show API key" : "Hide API key");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const apiKey = apiKeyInput.value.trim();
      const userMessage = messageInput.value.trim();

      if (!apiKey) {
        showError("Enter your Groq API key to begin.");
        apiKeyInput.focus();
        return;
      }

      if (!userMessage) {
        messageInput.focus();
        return;
      }

      clearError();
      addMessage("user", userMessage);
      conversation.push({ role: "user", content: userMessage });

      messageInput.value = "";
      setLoading(true);
      const typingIndicator = addTypingIndicator();

      try {
        const response = await fetch(GROQ_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: conversation,
            temperature: 0.7,
            max_tokens: 180
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error?.message || "The request could not be completed.");
        }

        const assistantMessage = data?.choices?.[0]?.message?.content?.trim();

        if (!assistantMessage) {
          throw new Error("No reflection was returned. Please try again.");
        }

        conversation.push({ role: "assistant", content: assistantMessage });
        addMessage("assistant", assistantMessage);
      } catch (error) {
        console.error(error);
        showError(error.message || "Something went wrong. Please try again.");
      } finally {
        typingIndicator.remove();
        setLoading(false);
        messageInput.focus();
      }
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    addMessage("assistant", "What is on your mind today? Let's untangle it.");
  </script>
</body>
</html>
