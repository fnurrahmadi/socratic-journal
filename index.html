<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <title>Signal — private reflection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    :root { --ink:#050505; --paper:#f3f0e7; --yellow:#f4e500; --grey:#aaa9a2; --line:#363636; --danger:#ff6b62; }
    * { box-sizing:border-box; } body { min-width:320px; min-height:100vh; margin:0; color:var(--paper); background:var(--ink); font-family:"Space Grotesk",sans-serif; } button,textarea { font:inherit; }
    .shell { width:min(100% - 32px,920px); min-height:100vh; margin:auto; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:27px 0 21px; border-bottom:1px solid var(--line); }.mark { display:flex; align-items:center; gap:12px; color:var(--yellow); font:600 13px/1 "IBM Plex Mono",monospace; letter-spacing:.19em; text-transform:uppercase; }.mark-symbol { width:21px; height:21px; display:grid; place-items:center; border:2px solid var(--yellow); border-radius:50%; font-size:16px; letter-spacing:0; }.status { color:var(--grey); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.12em; text-transform:uppercase; }.status::before { content:""; display:inline-block; width:7px; height:7px; margin-right:7px; border-radius:50%; background:var(--yellow); box-shadow:0 0 10px var(--yellow); }
    .intro { padding:clamp(36px,8vw,76px) 0 26px; }.eyebrow { margin:0 0 12px; color:var(--yellow); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.16em; text-transform:uppercase; } h1 { max-width:650px; margin:0; font-size:clamp(2.15rem,7vw,4.8rem); font-weight:600; letter-spacing:-.065em; line-height:.93; } h1 em { color:var(--yellow); font-style:normal; }.subhead { max-width:425px; margin:20px 0 0; color:var(--grey); font-size:15px; line-height:1.5; }
    .terminal { flex:1; min-height:390px; border:1px solid var(--line); background:#0a0a0a; }.terminal-bar { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid var(--line); color:var(--grey); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.1em; text-transform:uppercase; }.actions { display:flex; gap:4px; }.text-button { padding:5px 7px; border:0; background:transparent; color:var(--grey); cursor:pointer; font:inherit; letter-spacing:inherit; text-transform:inherit; }.text-button:hover { color:var(--yellow); }
    #chat { min-height:315px; max-height:48vh; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:23px; scroll-behavior:smooth; }.message { width:min(100%,680px); font-size:15px; line-height:1.55; white-space:pre-wrap; overflow-wrap:anywhere; }.message.user { align-self:flex-end; padding-left:32px; }.message-label { margin-bottom:7px; color:var(--yellow); font:500 10px/1 "IBM Plex Mono",monospace; letter-spacing:.13em; text-transform:uppercase; }.message.user .message-label { color:var(--grey); text-align:right; }.message-body { border-left:2px solid var(--yellow); padding-left:12px; }.message.user .message-body { border-left:0; border-right:2px solid var(--grey); padding:0 12px 0 0; text-align:right; }
    .typing { display:flex; align-items:center; gap:6px; min-height:24px; }.dot { width:5px; height:5px; background:var(--yellow); animation:blink 1s infinite alternate; }.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}@keyframes blink{to{opacity:.18}}
    .composer { display:flex; border-top:1px solid var(--line); }textarea { flex:1; min-width:0; min-height:82px; resize:vertical; border:0; outline:0; padding:19px 18px; background:transparent; color:var(--paper); font-size:15px; line-height:1.45; }textarea::placeholder{color:#797871}#reflectButton { width:144px; border:0; border-left:1px solid var(--line); background:var(--yellow); color:#070707; cursor:pointer; font:600 11px/1 "IBM Plex Mono",monospace; letter-spacing:.1em; text-transform:uppercase; transition:background .15s,color .15s; }#reflectButton:hover:not(:disabled){background:var(--paper)}#reflectButton:disabled{cursor:wait;opacity:.6}
    #turnstile-container { display:none; padding:14px 18px 0; }.turnstile-note { margin:0; color:var(--grey); font:500 10px/1.4 "IBM Plex Mono",monospace; letter-spacing:.05em; text-transform:uppercase; }.error { min-height:18px; margin:10px 0 0; color:var(--danger); font:500 11px/1.4 "IBM Plex Mono",monospace; }.footer { display:flex; justify-content:space-between; gap:16px; padding:17px 0 27px; color:#85847e; font:400 10px/1.45 "IBM Plex Mono",monospace; letter-spacing:.04em; }button:focus-visible,textarea:focus-visible { outline:2px solid var(--yellow); outline-offset:2px; }
    @media(max-width:600px){.shell{width:min(100% - 24px,920px)}.status{font-size:8px}.intro{padding-top:45px}.terminal{min-height:450px}#chat{max-height:none;min-height:350px;padding:18px}.composer{display:block}textarea{width:100%;min-height:100px}#reflectButton{width:100%;height:55px;border:0;border-top:1px solid var(--line)}.footer{display:block}.footer span+span{display:block;margin-top:5px}} @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="shell">
    <header><div class="mark"><span class="mark-symbol">S</span> Signal</div><div class="status">private channel</div></header>
    <section class="intro"><p class="eyebrow">/// Socratic journaling companion</p><h1>Say the quiet part <em>out loud.</em></h1><p class="subhead">No advice. No answers. Just a place to follow the thread of what you are thinking.</p></section>
    <section class="terminal" aria-label="Journal conversation"><div class="terminal-bar"><span>reflection log</span><div class="actions"><button class="text-button" id="exportButton" type="button">export</button><button class="text-button" id="clearButton" type="button">clear</button></div></div><div id="chat" role="log" aria-live="polite"></div><div id="turnstile-container" aria-label="Bot protection"></div><form id="composer" class="composer"><textarea id="messageInput" rows="3" maxlength="6000" placeholder="Type what is on your mind..." aria-label="Your journal entry"></textarea><button id="reflectButton" type="submit">Reflect ↗</button></form></section>
    <p class="error" id="error" role="alert" hidden></p><footer class="footer"><span>CTRL + ENTER / SEND</span><span>PRIVATE SESSION · NOT EMERGENCY OR MENTAL-HEALTH SUPPORT</span></footer>
  </main>
  <script>
    const API_ENDPOINT = "https://socratic-journal-api.fnurrahmadi.workers.dev/chat";
    // Optional abuse protection: paste your public Turnstile site key here after creating a widget in Cloudflare.
    const TURNSTILE_SITE_KEY = "0x4AAAAAADzpzSnvPF0pD4or";
    const MAX_CONVERSATION_MESSAGES = 38;
    const REQUEST_TIMEOUT_MS = 30000;
    const chat=document.getElementById("chat"),form=document.getElementById("composer"),messageInput=document.getElementById("messageInput"),reflectButton=document.getElementById("reflectButton"),errorElement=document.getElementById("error"),clearButton=document.getElementById("clearButton"),exportButton=document.getElementById("exportButton"),turnstileContainer=document.getElementById("turnstile-container");
    const conversation=[]; let turnstileToken="",turnstileWidgetId=null,isSubmitting=false,sessionProof=sessionStorage.getItem("signal-session-proof")||"";
    function addMessage(role,content){const message=document.createElement("article");message.className=`message ${role}`;const label=document.createElement("div");label.className="message-label";label.textContent=role==="assistant"?"Signal / reflection":"You / transmission";const body=document.createElement("div");body.className="message-body";body.textContent=content;message.append(label,body);chat.appendChild(message);chat.scrollTop=chat.scrollHeight}
    function addTypingIndicator(){const indicator=document.createElement("div");indicator.className="message assistant typing";indicator.setAttribute("aria-label","Signal is reflecting");indicator.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';chat.appendChild(indicator);chat.scrollTop=chat.scrollHeight;return indicator}function showError(message){errorElement.textContent=message;errorElement.hidden=false}function clearError(){errorElement.textContent="";errorElement.hidden=true}function setLoading(loading){isSubmitting=loading;reflectButton.disabled=loading;messageInput.disabled=loading;reflectButton.textContent=loading?"Listening...":"Reflect ↗"}
    function resetSession(){conversation.length=0;chat.replaceChildren();clearError();addMessage("assistant","What is on your mind today? Let's untangle it.");messageInput.focus()}
    function exportSession(){if(!conversation.length)return showError("There is no reflection to export yet.");const lines=["SIGNAL — PRIVATE REFLECTION",`Exported ${new Date().toLocaleString()}`,"",...conversation.flatMap(message=>[message.role==="user"?"YOU":"SIGNAL",message.content," "])];const file=new Blob([lines.join("\n")],{type:"text/markdown;charset=utf-8"});const link=document.createElement("a");link.href=URL.createObjectURL(file);link.download=`signal-reflection-${new Date().toISOString().slice(0,10)}.md`;link.click();URL.revokeObjectURL(link.href)}
    function setupTurnstile(){if(!TURNSTILE_SITE_KEY)return;turnstileContainer.style.display="block";turnstileContainer.innerHTML='<p class="turnstile-note">Loading verification…</p>';const script=document.createElement("script");script.src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit";script.async=true;script.onload=()=>{try{turnstileContainer.replaceChildren();turnstileWidgetId=window.turnstile.render("#turnstile-container",{sitekey:TURNSTILE_SITE_KEY,theme:"dark",callback:token=>{turnstileToken=token;turnstileContainer.style.display="none";clearError()},"expired-callback":()=>{turnstileToken=""},"error-callback":()=>showError("Verification could not load. Check the Turnstile hostname and try again.")})}catch(error){showError(`Verification could not start: ${error.message||"invalid Turnstile configuration"}`)}};script.onerror=()=>showError("Verification could not load. Check your network or content-blocking extension.");document.head.appendChild(script)}
    clearButton.addEventListener("click",resetSession);exportButton.addEventListener("click",exportSession);
    form.addEventListener("submit",async event=>{event.preventDefault();if(isSubmitting)return;const userMessage=messageInput.value.trim();if(!userMessage)return messageInput.focus();if(TURNSTILE_SITE_KEY&&!sessionProof&&!turnstileToken){const wasHidden=turnstileContainer.style.display==="none";turnstileContainer.style.display="block";if(wasHidden&&turnstileWidgetId!==null)window.turnstile.reset(turnstileWidgetId);return showError("Please complete the verification before reflecting.");}clearError();addMessage("user",userMessage);conversation.push({role:"user",content:userMessage});while(conversation.length>MAX_CONVERSATION_MESSAGES)conversation.shift();messageInput.value="";setLoading(true);const typing=addTypingIndicator();const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),REQUEST_TIMEOUT_MS);try{const response=await fetch(API_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:conversation,turnstileToken,sessionProof}),signal:controller.signal});const data=await response.json();if(!response.ok)throw new Error(data.error||"The reflection service could not respond.");if(!data.message)throw new Error("No reflection was returned. Please try again.");if(data.sessionProof){sessionProof=data.sessionProof;sessionStorage.setItem("signal-session-proof",sessionProof);turnstileContainer.style.display="none"}conversation.push({role:"assistant",content:data.message});while(conversation.length>MAX_CONVERSATION_MESSAGES)conversation.shift();addMessage("assistant",data.message);turnstileToken=""}catch(error){console.error(error);showError(error.name==="AbortError"?"The reflection took too long. Please try again.":error.message||"A connection error occurred. Please try again.");turnstileToken="";sessionProof="";sessionStorage.removeItem("signal-session-proof");if(turnstileWidgetId!==null){turnstileContainer.style.display="block";window.turnstile.reset(turnstileWidgetId)}}finally{clearTimeout(timeout);typing.remove();setLoading(false);messageInput.focus()}});
    messageInput.addEventListener("keydown",event=>{if(event.key==="Enter"&&(event.ctrlKey||event.metaKey)){event.preventDefault();if(!event.repeat&&!isSubmitting)form.requestSubmit()}});setupTurnstile();resetSession();
  </script>
</body>
</html>
